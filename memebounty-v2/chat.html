<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seki Assistant · AI 对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d1a;--bg2:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);
  --p:#a78bfa;--tx:#e8e4ff;--tx2:#b0a8d0;--tx3:#6b6488;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);}
body{
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,58,237,.22) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 90%,rgba(79,70,229,.12) 0%,transparent 50%);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}

/* NAV */
.nav{
  display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;
  border-bottom:1px solid var(--bd);background:rgba(13,13,26,.9);backdrop-filter:blur(16px);
  flex-shrink:0;
}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;color:var(--tx);text-decoration:none;}
.nav-logo img{width:30px;height:30px;border-radius:9px;object-fit:cover;border:1.5px solid rgba(167,139,250,.4);}
.nav-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:var(--p);padding:2px 7px;border-radius:5px;}
.nav-back{margin-left:auto;font-size:12px;color:var(--tx3);text-decoration:none;padding:5px 12px;border:1px solid var(--bd);border-radius:8px;transition:border-color .15s,color .15s;}
.nav-back:hover{border-color:rgba(167,139,250,.4);color:var(--p);}

/* LAYOUT */
.chat-layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;border-right:1px solid var(--bd);
  display:flex;flex-direction:column;padding:16px 12px;gap:8px;
  background:rgba(255,255,255,.02);
}
.sidebar-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--tx3);padding:0 8px;margin-bottom:4px;}
.sid-btn{
  display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;
  border:none;background:none;color:var(--tx2);font-size:13px;cursor:pointer;
  font-family:var(--font);text-align:left;transition:background .15s,color .15s;width:100%;
}
.sid-btn:hover{background:rgba(255,255,255,.06);color:var(--tx);}
.sid-btn.active{background:rgba(124,58,237,.15);color:var(--p);border:1px solid rgba(124,58,237,.25);}
.sid-btn .sid-icon{font-size:15px;flex-shrink:0;}
.sid-new{
  margin-top:auto;width:100%;padding:10px;border-radius:10px;
  background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(79,70,229,.3));
  border:1px solid rgba(124,58,237,.4);color:var(--p);font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:opacity .15s;
}
.sid-new:hover{opacity:.85;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.chat-hdr{
  padding:16px 24px;border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.chat-hdr-avatar{width:40px;height:40px;border-radius:12px;overflow:hidden;flex-shrink:0;}
.chat-hdr-avatar img{width:100%;height:100%;object-fit:cover;}
.chat-hdr-info .name{font-size:15px;font-weight:800;}
.chat-hdr-info .sub{font-size:12px;color:#34d399;display:flex;align-items:center;gap:4px;}
.chat-hdr-info .sub::before{content:'';width:6px;height:6px;border-radius:50%;background:#34d399;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.chat-hdr-clear{margin-left:auto;font-size:12px;color:var(--tx3);cursor:pointer;padding:5px 10px;border:1px solid var(--bd);border-radius:7px;background:none;font-family:var(--font);transition:border-color .15s,color .15s;}
.chat-hdr-clear:hover{border-color:rgba(239,68,68,.4);color:#f87171;}

.msgs{
  flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;
  scrollbar-width:thin;scrollbar-color:rgba(124,58,237,.25) transparent;
}

/* MESSAGES */
.msg{display:flex;gap:10px;align-items:flex-start;max-width:720px;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.msg.bot{align-self:flex-start;}
.msg-avatar{width:34px;height:34px;border-radius:10px;overflow:hidden;flex-shrink:0;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-user-av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.bubble{
  padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.75;word-break:break-word;
  max-width:100%;
}
.msg.bot .bubble{
  background:rgba(255,255,255,.04);border:1px solid var(--bd);color:var(--tx);
  border-radius:4px 16px 16px 16px;
}
.msg.user .bubble{
  background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;
  border-radius:16px 4px 16px 16px;
}
.bubble pre{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-size:12px;}
.bubble code{font-family:monospace;font-size:12px;background:rgba(0,0,0,.25);padding:1px 5px;border-radius:4px;}

/* TYPING */
.typing-dots{display:flex;gap:4px;align-items:center;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:4px 16px 16px 16px;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--p);animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.4s;}
.typing-dots span:nth-child(3){animation-delay:.8s;}
@keyframes tdot{0%,80%,100%{opacity:.15;transform:scale(.9);}40%{opacity:1;transform:scale(1.1);}}

/* SUGGESTIONS */
.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 16px;}
.sug{
  padding:7px 14px;border:1px solid var(--bd);border-radius:20px;
  font-size:12px;color:var(--tx2);cursor:pointer;background:var(--bg2);
  transition:border-color .15s,color .15s;
}
.sug:hover{border-color:rgba(167,139,250,.5);color:var(--p);}

/* INPUT */
.input-area{
  padding:16px 24px;border-top:1px solid var(--bd);flex-shrink:0;
  background:rgba(13,13,26,.8);backdrop-filter:blur(12px);
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
  background:rgba(255,255,255,.04);border:1px solid var(--bd);
  border-radius:14px;padding:10px 12px;
  transition:border-color .2s;
}
.input-row:focus-within{border-color:rgba(124,58,237,.5);}
#chat-input{
  flex:1;background:none;border:none;outline:none;color:var(--tx);
  font-size:14px;font-family:var(--font);resize:none;
  max-height:140px;line-height:1.6;
}
#chat-input::placeholder{color:var(--tx3);}
.send-btn{
  width:36px;height:36px;border-radius:9px;border:none;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;
  align-self:flex-end;
}
.send-btn:hover{opacity:.85;}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.input-hint{font-size:11px;color:var(--tx3);margin-top:8px;text-align:center;}

/* WELCOME */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;gap:20px;text-align:center;
}
.welcome-avatar{width:72px;height:72px;border-radius:20px;overflow:hidden;box-shadow:0 0 40px rgba(124,58,237,.4);}
.welcome-avatar img{width:100%;height:100%;object-fit:cover;}
.welcome h2{font-size:clamp(20px,3vw,28px);font-weight:900;letter-spacing:-1px;}
.welcome p{font-size:14px;color:var(--tx2);line-height:1.8;max-width:400px;}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.chip{
  padding:8px 16px;border:1px solid rgba(124,58,237,.3);border-radius:20px;
  font-size:13px;color:var(--p);cursor:pointer;background:rgba(124,58,237,.08);
  transition:background .15s,border-color .15s;
}
.chip:hover{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.5);}

/* MOBILE */
@media(max-width:640px){
  .sidebar{display:none;}
  .chat-hdr{padding:12px 16px;}
  .msgs{padding:16px;}
  .input-area{padding:12px 16px;}
  .suggestions{padding:0 16px 12px;}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <img src="/seki-avatar.jpg" alt="Seki">
    <span>Seki</span>
    <span class="nav-badge">AI CHAT</span>
  </a>
  <a href="/" class="nav-back">← 返回主站</a>
</nav>

<div class="chat-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">SEKI ASSISTANT</div>
    <button class="sid-btn active" onclick="setSug('general')">
      <span class="sid-icon">💬</span>通用对话
    </button>
    <button class="sid-btn" onclick="setSug('seki')">
      <span class="sid-icon">🤖</span>Seki 平台
    </button>
    <button class="sid-btn" onclick="setSug('erc8183')">
      <span class="sid-icon">📜</span>ERC-8183
    </button>
    <button class="sid-btn" onclick="setSug('meme')">
      <span class="sid-icon">🚀</span>Meme 代币
    </button>
    <button class="sid-btn" onclick="setSug('defi')">
      <span class="sid-icon">💎</span>DeFi / 链上
    </button>
    <button class="sid-new" onclick="clearChat()">+ 新对话</button>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-hdr">
      <div class="chat-hdr-avatar"><img src="/seki-avatar.jpg" alt="Seki"></div>
      <div class="chat-hdr-info">
        <div class="name">Seki Assistant</div>
        <div class="sub">在线 · GPT-5.4 驱动</div>
      </div>
      <button class="chat-hdr-clear" onclick="clearChat()">清空对话</button>
    </div>

    <div id="msgs-wrap" class="msgs">
      <!-- welcome shown when no messages -->
      <div id="welcome" class="welcome">
        <div class="welcome-avatar"><img src="/seki-avatar.jpg" alt="Seki"></div>
        <h2>嗨，我是 Seki Assistant 👋</h2>
        <p>由 GPT-5.4 驱动的 AI 助手。可以聊 Seki 平台、ERC-8183、Meme 代币，或者任何你想聊的话题。</p>
        <div class="welcome-chips" id="welcome-chips">
          <div class="chip" onclick="askQ('Seki 是什么平台？')">Seki 是什么平台？</div>
          <div class="chip" onclick="askQ('ERC-8183 协议是什么？')">ERC-8183 是什么？</div>
          <div class="chip" onclick="askQ('怎么委托 AI Agent 管理我的代币？')">怎么委托 Agent？</div>
          <div class="chip" onclick="askQ('taxPool 里的资金安全吗？')">taxPool 安全吗？</div>
          <div class="chip" onclick="askQ('BSC 上怎么发 Meme 代币？')">怎么发 Meme 代币？</div>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions" style="display:none">
      <span class="sug" onclick="askQ(this.textContent)">taxPool 是什么？</span>
      <span class="sug" onclick="askQ(this.textContent)">怎么创建激励任务？</span>
      <span class="sug" onclick="askQ(this.textContent)">Agent 怎么决定发任务？</span>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="chat-input" placeholder="问点什么，或者随便聊聊..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>

</div>

<script>
const SUGS = {
  general:['随便聊聊','讲个笑话','推荐一本书','今天有什么新鲜事'],
  seki:['Seki 是什么平台？','taxPool 怎么运作？','怎么委托 AI Agent？','任务奖励怎么发放？'],
  erc8183:['ERC-8183 是什么协议？','Client/Provider/Evaluator 角色是什么？','Job 状态机有哪几个状态？','ERC-8183 和普通合约有什么区别？'],
  meme:['怎么在 four.meme 发代币？','Meme 代币如何保持热度？','taxPool 收的是哪种税？','持仓门槛是多少？'],
  defi:['BNB 链上有哪些主流 DEX？','什么是流动性池？','链上交易 Gas 怎么算？','DeFi 风险有哪些？']
};

let msgs=[], loading=false;

function setSug(type){
  document.querySelectorAll('.sid-btn').forEach(b=>b.classList.remove('active'));
  event.target.closest('.sid-btn').classList.add('active');
  const sugsEl=document.getElementById('suggestions');
  const chips=sugsEl.querySelectorAll('.sug');
  const list=SUGS[type]||SUGS.general;
  chips.forEach((c,i)=>{if(list[i]){c.textContent=list[i];c.style.display='';}else c.style.display='none';});
  if(msgs.length>0)sugsEl.style.display='flex';
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,140)+'px';
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function askQ(q){
  document.getElementById('chat-input').value=q;
  sendMsg();
}

function clearChat(){
  msgs=[];
  const wrap=document.getElementById('msgs-wrap');
  wrap.innerHTML='<div id="welcome" class="welcome">'+
    '<div class="welcome-avatar"><img src="/seki-avatar.jpg" alt="Seki"></div>'+
    '<h2>嗨，我是 Seki Assistant 👋</h2>'+
    '<p>由 GPT-5.4 驱动的 AI 助手。可以聊 Seki 平台、ERC-8183、Meme 代币，或者任何你想聊的话题。</p>'+
    '<div class="welcome-chips">'+
    '<div class="chip" onclick="askQ(\'Seki 是什么平台？\')">Seki 是什么平台？</div>'+
    '<div class="chip" onclick="askQ(\'ERC-8183 协议是什么？\')">ERC-8183 是什么？</div>'+
    '<div class="chip" onclick="askQ(\'怎么委托 AI Agent 管理我的代币？\')">怎么委托 Agent？</div>'+
    '<div class="chip" onclick="askQ(\'taxPool 里的资金安全吗？\')">taxPool 安全吗？</div>'+
    '</div></div>';
  document.getElementById('suggestions').style.display='none';
}

function appendMsg(role, text, id){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  document.getElementById('suggestions').style.display='flex';
  const wrap=document.getElementById('msgs-wrap');
  const div=document.createElement('div');
  div.className='msg '+role;
  if(id)div.id=id;
  if(role==='user'){
    div.innerHTML='<div class="msg-user-av">你</div><div class="bubble">'+
      text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</div>';
  }else{
    div.innerHTML='<div class="msg-avatar"><img src="/seki-avatar.jpg"></div>'+
      '<div class="bubble">'+text+'</div>';
  }
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
  return div;
}

function appendTyping(){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const wrap=document.getElementById('msgs-wrap');
  const div=document.createElement('div');
  div.className='msg bot';div.id='typing-indicator';
  div.innerHTML='<div class="msg-avatar"><img src="/seki-avatar.jpg"></div>'+
    '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;
}

// simple markdown: bold, code, codeblock
function md(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1<\/code><\/pre>')
    .replace(/`([^`]+)`/g,'<code>$1<\/code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1<\/strong>')
    .replace(/\n/g,'<br>');
}

async function sendMsg(){
  if(loading)return;
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';
  msgs.push({role:'user',content:text});
  appendMsg('user',text);
  loading=true;
  document.getElementById('send-btn').disabled=true;
  appendTyping();
  try{
    const resp=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs})
    });
    const typing=document.getElementById('typing-indicator');
    if(typing)typing.remove();
    const msgDiv=appendMsg('bot','');
    const bubbleEl=msgDiv.querySelector('.bubble');
    const reader=resp.body.getReader();const dec=new TextDecoder();
    let full='';
    const wrap=document.getElementById('msgs-wrap');
    while(true){
      const {done,value}=await reader.read();if(done)break;
      const lines=dec.decode(value).split('\n');
      for(const line of lines){
        if(!line.startsWith('data:'))continue;
        const d=line.slice(5).trim();
        if(d==='[DONE]')break;
        try{const j=JSON.parse(d);const delta=j.choices?.[0]?.delta?.content||'';
          if(delta){full+=delta;bubbleEl.innerHTML=md(full);wrap.scrollTop=wrap.scrollHeight;}}
        catch(e){}
      }
    }
    if(full)msgs.push({role:'assistant',content:full});
  }catch(e){
    const t=document.getElementById('typing-indicator');if(t)t.remove();
    appendMsg('bot','抱歉出错了：'+e.message);
  }
  loading=false;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('chat-input').focus();
}
</script>
</body>
</html>
